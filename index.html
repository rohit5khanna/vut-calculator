<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V-U-T Calculator</title>
  <style>
    :root {
      --bg: #eef1f6;
      --card: #ffffff;
      --border: #b8c0cc;
      --text: #12151c;
      --muted: #4a5368;
      --accent: #163d72;
      --output-bg: #e4ecf7;
      --input-bg: #fafbfc;
      --shadow: 0 2px 8px rgba(18, 21, 28, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 720px) {
      .panels {
        grid-template-columns: 1fr;
      }
    }

    .panels section {
      height: 100%;
    }

    header {
      margin-bottom: 1.75rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }

    header h1 {
      margin: 0 0 0.35rem;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    section {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 0;
      padding: 1.5rem 1.75rem;
      box-shadow: var(--shadow);
    }

    #inputs {
      background: var(--input-bg);
    }

    section h2 {
      margin: 0 0 1.25rem;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      padding-bottom: 0.65rem;
      border-bottom: 2px solid var(--accent);
    }

    .time-units-field {
      margin-bottom: 1.25rem;
      padding: 0.9rem 1rem;
      background: #fff;
      border: 2px solid var(--accent);
      border-radius: 0;
    }

    .time-units-field label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .time-units-field input {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 0;
      font-size: 1rem;
      background: #fff;
    }

    .time-units-field input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .field {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.35rem 1rem;
      align-items: center;
      margin-bottom: 0.95rem;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      font-size: 0.98rem;
      font-weight: 500;
    }

    .field .control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .field input[type="number"],
    .field input[type="text"] {
      width: 120px;
      padding: 0.5rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 0;
      font-size: 0.98rem;
      text-align: right;
      background: #fff;
    }

    .field input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .unit {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      min-width: 3rem;
      text-align: left;
    }

    .group-label {
      font-weight: 700;
      font-size: 0.92rem;
      color: var(--text);
      margin: 1.1rem 0 0.8rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--border);
    }

    .group-label:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    #outputs {
      background: var(--output-bg);
      border-color: var(--accent);
    }

    .result {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.7rem 0;
      border-bottom: 1px solid #c5d0e0;
    }

    .result:last-of-type {
      border-bottom: none;
    }

    .result-name {
      font-size: 0.98rem;
      font-weight: 500;
    }

    .result-value {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-size: 1.02rem;
    }

    .result-value .unit-inline {
      font-weight: 500;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .output-note {
      margin-top: 1.25rem;
      padding-top: 0.9rem;
      border-top: 1px solid #c5d0e0;
      font-size: 0.82rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>V-U-T Calculator</h1>
      <p>V-U-T — Variability · Utilization · Time</p>
    </header>

    <div class="panels">
      <section id="inputs">
        <h2>Inputs</h2>

        <div class="time-units-field">
          <label for="timeUnit">Enter Time Units</label>
          <input type="text" id="timeUnit" value="hours" placeholder="e.g. hours, min, days">
        </div>

        <div class="group-label">Inter-arrival time</div>

        <div class="field">
          <label for="mA">Mean IA time μ<sub>A</sub></label>
          <div class="control">
            <input type="number" id="mA" value="5" step="any">
            <span class="unit" id="unit-mA">hours</span>
          </div>
        </div>

        <div class="field">
          <label for="cva">Coeff. of variation CV<sub>A</sub></label>
          <div class="control">
            <input type="number" id="cva" value="0.4" step="any">
          </div>
        </div>

        <div class="group-label">Processing time</div>

        <div class="field">
          <label for="mP">Mean processing time μ<sub>P</sub></label>
          <div class="control">
            <input type="number" id="mP" value="18" step="any">
            <span class="unit" id="unit-mP">hours</span>
          </div>
        </div>

        <div class="field">
          <label for="cvp">Coeff. of variation CV<sub>P</sub></label>
          <div class="control">
            <input type="number" id="cvp" value="0.333333" step="any">
          </div>
        </div>

        <div class="group-label">Servers</div>

        <div class="field">
          <label for="servers">No. of servers m</label>
          <div class="control">
            <input type="number" id="servers" value="4" step="any">
          </div>
        </div>
      </section>

      <section id="outputs">
        <h2>Outputs</h2>

        <div class="result">
          <span class="result-name">Utilization u</span>
          <span class="result-value" id="u">—</span>
        </div>
        <div class="result">
          <span class="result-name">Avg. waiting time T<sub>q</sub></span>
          <span class="result-value" id="tq">—</span>
        </div>
        <div class="result">
          <span class="result-name">Avg. time in system T</span>
          <span class="result-value" id="t">—</span>
        </div>
        <div class="result">
          <span class="result-name">Avg. no. in queue I<sub>q</sub></span>
          <span class="result-value" id="iq">—</span>
        </div>
        <div class="result">
          <span class="result-name">Avg. no. in system I</span>
          <span class="result-value" id="i">—</span>
        </div>

        <p class="output-note">Output cells update automatically</p>
      </section>
    </div>
  </div>

  <script>
  // Mirrors Excel named ranges and formulas (sheet "VUT formula")
  //
  // B14  u  = mP / (m * mA)
  // B15  Tq = (mP/m) * u^(sqrt(2*(m+1))-1) / (1-u) * (CVA^2 + CVP^2) / 2
  // B17  T  = Tq + mP
  // B18  Iq = Tq / mA
  // B19  I  = T / mA

  function computeVUT(mA, cva, mP, cvp, servers) {
    const m = servers;

    const u = mP / (m * mA);

    const exponent = Math.sqrt(2 * (m + 1)) - 1;
    const variability = (cva * cva + cvp * cvp) / 2;
    const tq = (mP / m) * Math.pow(u, exponent) / (1 - u) * variability;

    const t = tq + mP;
    const iq = tq / mA;
    const i = t / mA;

    return { u, tq, t, iq, i };
  }

  function formatValue(value) {
    if (value === Infinity) return "∞";
    if (value === -Infinity) return "−∞";
    if (Number.isNaN(value)) return "NaN";
    return value.toFixed(3);
  }

  function getTimeUnit() {
    const raw = document.getElementById("timeUnit").value.trim();
    return raw || "units";
  }

  function updateUnitLabels() {
    const unit = getTimeUnit();
    document.getElementById("unit-mA").textContent = unit;
    document.getElementById("unit-mP").textContent = unit;
  }

  const inputIds = ["mA", "cva", "mP", "cvp", "servers"];

  function setResult(id, value, unit) {
    const el = document.getElementById(id);
    if (unit) {
      el.innerHTML = `${value} <span class="unit-inline">${unit}</span>`;
    } else {
      el.textContent = value;
    }
  }

  function refresh() {
    const mA = Number(document.getElementById("mA").value);
    const cva = Number(document.getElementById("cva").value);
    const mP = Number(document.getElementById("mP").value);
    const cvp = Number(document.getElementById("cvp").value);
    const servers = Number(document.getElementById("servers").value);
    const timeUnit = getTimeUnit();

    updateUnitLabels();

    const result = computeVUT(mA, cva, mP, cvp, servers);

    setResult("u", formatValue(result.u));
    setResult("tq", formatValue(result.tq), timeUnit);
    setResult("t", formatValue(result.t), timeUnit);
    setResult("iq", formatValue(result.iq));
    setResult("i", formatValue(result.i));
  }

  inputIds.forEach((id) => {
    document.getElementById(id).addEventListener("input", refresh);
  });

  document.getElementById("timeUnit").addEventListener("input", refresh);

  refresh();
  </script>
</body>
</html>
